name: Update prices
on:
  schedule:
    - cron: '10 1 * * *'   # 08:10 Asia/Bangkok
    - cron: '10 11 * * *'  # 18:10 Asia/Bangkok
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: python scripts/update_prices.py
      - name: Commit
        run: |
          git config user.name "price-bot"
          git config user.email "bot@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "update prices $(date -u +%F_%H:%M)"
          git push
